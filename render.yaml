services:
  - type: web
    name: fitnex-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node api/index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY        # Optional — fallback AI for food parsing
        sync: false
      - key: CLIENT_URL          # Set to your Vercel frontend URL after deploy
        sync: false
      - key: PORT
        value: 10000
